<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AltRes - My Orders</title>
  <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
  <link rel="stylesheet" href="../css/orderStyle/orderStyle.css">
</head>
<body>
  <section class="myOrders">
    <h1>My <span>Orders</span></h1>

    <div class="orders-container">
      <!-- Order Card 1 -->
      <div class="order-card">
        <div class="order-header">
          <h2>Order #1001</h2>
          <span class="status pending">Pending</span>
        </div>
        <div class="order-items">
          <ul>
            <li><span>Pork Adobo</span> x2 <span>₱300</span></li>
            <li><span>Vegetable Stir-Fry</span> x1 <span>₱150</span></li>
          </ul>
        </div>
        <div class="order-total">Total: ₱450</div>
        <div class="actions">
          <button>Cancel</button>
          <button>Reorder</button>
        </div>
      </div>

      <!-- Order Card 2 -->
      <div class="order-card">
        <div class="order-header">
          <h2>Order #1000</h2>
          <span class="status completed">Completed</span>
        </div>
        <div class="order-items">
          <ul>
            <li><span>Chocolate Cake</span> x1 <span>₱200</span></li>
            <li><span>Side Dish</span> x2 <span>₱180</span></li>
          </ul>
        </div>
        <div class="order-total">Total: ₱380</div>
        <div class="actions">
          <button>Reorder</button>
        </div>
      </div>

      <!-- Order Card 3 -->
      <div class="order-card">
        <div class="order-header">
          <h2>Order #999</h2>
          <span class="status cancelled">Cancelled</span>
        </div>
        <div class="order-items">
          <ul>
            <li><span>Vegetable Stir-Fry</span> x1 <span>₱150</span></li>
          </ul>
        </div>
        <div class="order-total">Total: ₱150</div>
        <div class="actions">
          <button>Reorder</button>
        </div>
      </div>
    </div>
  </section>
</body>
</html>
